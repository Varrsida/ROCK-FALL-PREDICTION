<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockfall Prediction</title>
    <link rel="stylesheet" href="css/prediction.css">
</head>
<body>

<div class="container">

    <h1>Rockfall Prediction</h1>

    <label>Rainfall (mm)</label>
    <input type="number" id="rainfall">

    <label>Slope Angle (°)</label>
    <input type="number" id="slope">

    <label>Ground Vibration</label>
    <input type="number" id="vibration">

    <label>Soil Moisture (%)</label>
    <input type="number" id="moisture">

    <button onclick="predict()">Predict</button>

    <h2 id="result"></h2>

</div>

<script src="js/prediction.js"></script>

</body>
</html>
